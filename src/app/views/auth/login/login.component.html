<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Tapicería - Iniciar Sesión</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form (ngSubmit)="onLogin()">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo Electrónico</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="email" placeholder="ejemplo@correo.com" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" name="password" [(ngModel)]="password" placeholder="******" required>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width btn-login" type="submit">
          Ingresar al Sistema
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
